name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        # setup-signing-cert.sh is bash — checked with its own shell.
        run: |
          shellcheck --shell=sh \
            build.sh \
            install.sh \
            run.sh \
            stop.sh \
            scripts/hooks/commit-msg
          shellcheck --shell=bash setup-signing-cert.sh
