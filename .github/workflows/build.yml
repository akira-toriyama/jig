name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    # Bounded so a hung build can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # Shared Swift build (setup-xcode + SPM cache + build + test). jig
      # drives the build through ./build.sh (emits bin/jig).
      - uses: akira-toriyama/.github/actions/swift-build@main
        with:
          build-cmd: ./build.sh

      - name: Sanity check binary
        run: |
          file bin/jig && test -x bin/jig
          ./bin/jig --version
          echo '{"a":[1,2]}' | ./bin/jig -c '.a[]' | tr '\n' ' ' | grep -q '1 2'
